<!DOCTYPE html>
<html>
<head>
<style>
nav {
    background-color: lightblue;
    padding: 15px;
}
nav a {
    color: #fff;
    text-decoration: none;
    padding: 10px 20px;
    margin: 0px 10px;
    border-radius: 5px;
    background-color: #555;
    flex-wrap: wrap;
}
nav a:hover {
    background-color: aqua;
}
ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    flex-wrap: wrap;
    flex-direction: row;
}
li {
    margin-right: 20px;
    margin-bottom: 25px;
}
</style>
<title>
{% block title %}{% endblock %}
</title>
</head>
<body>
<center>
<h1 style="background-color: blue; color: yellow;">
COURSE MANAGEMENT PORTAL
</h1>
</center>
<nav>
<ul>
<li><a href="{% url 'course_list' %}">COURSE LIST</a></li>
<li><a href="{% url 'generate_csv' %}">COURSE LIST CSV DOWNLOAD</a></li>
<li><a href="{% url 'generate_pdf' %}">COURSE LIST PDF DOWNLOAD</a></li>
</ul>
</nav>
<section>
{% block content %}{% endblock %}
</section>
<footer>
<hr />
<center>
&copy; Designed and Developed by Django
</center>
</footer>
</body>
</html>
