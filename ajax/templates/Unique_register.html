<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body class="bg-light py-5">
    <div class="container">
      <h2 class="text-center mb-4">Student Sign-Up</h2>
      <form id="ajax-registration-form">
        <div class="mb-3">
          <input
            type="text"
            name="first_name"
            placeholder="First Name"
            class="form-control"
            required
          />
        </div>
        <div class="mb-3">
          <input
            type="text"
            name="last_name"
            placeholder="Last Name"
            class="form-control"
            required
          />
        </div>
        <div class="mb-3">
          <input
            type="email"
            name="email"
            placeholder="Email"
            class="formcontrol"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary w-100">Register</button>
      </form>
      <div id="response-message" class="mt-3 text-center"></div>
    </div>
    <script>
      $("#ajax-registration-form").on("submit", function (e) {
        e.preventDefault();
        $.ajax({
          type: "POST",
          url: "{% url 'ajax-student-register' %}",
          data: $(this).serialize(),
          success: function (response) {
            $("#response-message").text(response.message).css("color", "green");
            $("#ajax-registration-form")[0].reset();
          },
          error: function (xhr) {
            let msg = xhr.responseJSON?.error || "Submission failed.";
            $("#response-message").text(msg).css("color", "red");
          },
        });
      });
    </script>
  </body>
</html>
